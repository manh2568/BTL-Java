  <link rel="stylesheet" href="css/admin.css?v=1">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('javatruyen_theme');
        var isLight;
        if (t === 'light') isLight = true;
        else if (t === 'dark') isLight = false;
        else isLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
        var a = localStorage.getItem('javatruyen_accent');
        if (a && a !== 'gold') document.documentElement.setAttribute('data-accent', a);
        else document.documentElement.removeAttribute('data-accent');
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
